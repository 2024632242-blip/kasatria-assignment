<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <title>Kasatria 3D Periodic Table Assignment</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Library Three.js, CSS3DRenderer, Tween & PapaParse -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TrackballControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS3DRenderer.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
  
  <!-- SDK Google Login -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      background: radial-gradient(circle at center, #111a2e 0%, #050811 100%); 
      color: #fff; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      overflow: hidden; 
    }

    /* 1. SKRIN LOGIN GOOGLE */
    #login-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: rgba(10, 15, 30, 0.95);
    }
    #login-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
    }
    #login-card h2 { margin-top: 0; color: #fff; letter-spacing: 1px; }
    #login-card hr { border: 0; height: 1px; background: rgba(255,255,255,0.1); margin: 20px 0; }

    /* 2. SKRIN VISUALISASI 3D */
    #app { display: none; width: 100vw; height: 100vh; }
    #container { width: 100%; height: 100%; }

    /* MENU BUTANG DI BAWAH (Glassmorphic Pills) */
    #menu {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      z-index: 10;
    }
    button {
      color: #00f2fe;
      background: rgba(6, 182, 212, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 242, 254, 0.4);
      padding: 12px 24px;
      cursor: pointer;
      margin: 0 6px;
      font-weight: 700;
      border-radius: 30px;
      letter-spacing: 1.5px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(0, 242, 254, 0.15);
    }
    button:hover { 
      background: rgba(0, 242, 254, 0.3); 
      color: #fff; 
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.6);
      transform: translateY(-3px);
    }

    /* KAD GLASSMORPHISM */
    .element {
      width: 130px;
      height: 170px;
      border-radius: 10px;
      font-family: Helvetica, sans-serif;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 8px;
      
      /* Kesan Kaca (Glassmorphism Core) */
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      transition: all 0.4s ease;
    }

    .element:hover {
      transform: scale(1.15);
      z-index: 999;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 30px rgba(0, 242, 254, 0.8) !important;
    }

    .element .top-bar { 
      display: flex; 
      justify-content: space-between; 
      font-size: 11px; 
      font-weight: 800;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }

    .element img { 
      width: 65px; 
      height: 65px; 
      margin: 4px auto; 
      border-radius: 50%; /* Profil bulat */
      border: 2px solid rgba(255, 255, 255, 0.5);
      object-fit: cover; 
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .element .name { 
      font-size: 11px; 
      font-weight: 700; 
      color: #fff; 
      text-shadow: 0 2px 4px rgba(0,0,0,0.8); 
      word-break: break-word; 
      line-height: 1.2;
    }

    .element .details { 
      font-size: 10px; 
      font-weight: 600;
      opacity: 0.9; 
      color: #e0e0e0; 
      text-shadow: 0 1px 3px rgba(0,0,0,0.8); 
      background: rgba(0,0,0,0.25);
      padding: 2px 0;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- SKRIN LOGIN -->
  <div id="login-screen">
    <div id="login-card">
      <h2>Welcome Back</h2>
      <hr>
      <div id="g_id_onload"
           data-client_id="984195204022-03od1u3bmpioam9km1bfmkam0ub9pasq.apps.googleusercontent.com"
           data-callback="handleCredentialResponse">
      </div>
      <div class="g_id_signin" data-type="standard"></div>
    </div>
  </div>

  <!-- SKRIN 3D -->
  <div id="app">
    <div id="container"></div>
    <div id="menu">
      <button id="table">TABLE</button>
      <button id="sphere">SPHERE</button>
      <button id="helix">HELIX</button>
      <button id="grid">GRID</button>
    </div>
  </div>

  <script>
    // PAUTAN CSV PUBLISHED GOOGLE SHEET ANDA
    const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSD_t703GZotl734znImagqHzMEK_a9VaRTgq6kiLdlHz40MQaKcsWklFLZRIqY32brIFMHsWH4rSV3/pub?output=csv'; 
    // Nota: Gantikan URL di atas jika anda buat 'Publish to web' semula untuk CSV!

    let camera, scene, renderer, controls;
    const objects = [];
    const targets = { table: [], sphere: [], helix: [], grid: [] };

    // BERJAYA LOG IN GOOGLE
    function handleCredentialResponse(response) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      init3D();
    }

    function init3D() {
      camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
      camera.position.z = 3000;

      scene = new THREE.Scene();

      // BACA DATA DARI GOOGLE SHEET CSV
      Papa.parse(GOOGLE_SHEET_CSV_URL, {
        download: true,
        header: false, // Indeks lajur (0, 1, 2...)
        skipEmptyLines: true,
        complete: function(results) {
          const rawRows = results.data;
          if (rawRows.length <= 1) return;

          // Buang baris pertama (Header)
          const data = rawRows.slice(1);
          
          data.forEach((cols, i) => {
            if (!cols || cols.length < 2) return;

            // Indeks lajur: 0: Name | 1: Photo | 2: Age | 3: Country | 4: Interest | 5: Net Worth
            const name = cols[0] ? cols[0].trim() : 'Nama';
            const image = cols[1] ? cols[1].trim() : 'https://via.placeholder.com/80';
            const country = cols[3] ? cols[3].trim() : 'MY';
            
            // Pembersihan nilai Net Worth ($250,000 -> 250000)
            const rawNetWorth = cols[5] ? cols[5].toString().replace(/[\$, "]/g, '') : '0';
            const netWorth = parseFloat(rawNetWorth) || 0;

            // ELEMEN HTML TILE KAD
            const element = document.createElement('div');
            element.className = 'element';

            // PEWARNAAN GLASSMORPHISM NET WORTH
            if (netWorth < 100000) {
              element.style.backgroundColor = 'rgba(225, 29, 72, 0.45)'; // Red Glass
              element.style.boxShadow = '0 0 15px rgba(225, 29, 72, 0.3), inset 0 0 15px rgba(225, 29, 72, 0.2)';
            } else if (netWorth <= 200000) {
              element.style.backgroundColor = 'rgba(245, 158, 11, 0.45)'; // Orange Glass
              element.style.boxShadow = '0 0 15px rgba(245, 158, 11, 0.3), inset 0 0 15px rgba(245, 158, 11, 0.2)';
            } else {
              element.style.backgroundColor = 'rgba(16, 185, 129, 0.45)'; // Green Glass
              element.style.boxShadow = '0 0 15px rgba(16, 185, 129, 0.3), inset 0 0 15px rgba(16, 185, 129, 0.2)';
            }

            element.innerHTML = `
              <div class="top-bar"><span>${country}</span><span>${i + 1}</span></div>
              <img src="${image}" alt="${name}" onerror="this.src='https://via.placeholder.com/80?text=User'">
              <div class="name">${name}</div>
              <div class="details">$${netWorth.toLocaleString()}</div>
            `;

            // OBJEK CSS3D
            const object = new THREE.CSS3DObject(element);
            object.position.x = Math.random() * 4000 - 2000;
            object.position.y = Math.random() * 4000 - 2000;
            object.position.z = Math.random() * 4000 - 2000;
            scene.add(object);
            objects.push(object);

            // 1. ARRANGEMENT: TABLE (20 Lajur x 10 Baris)
            const objectTable = new THREE.Object3D();
            const col = i % 20;
            const r = Math.floor(i / 20);
            objectTable.position.x = (col * 150) - 1425;
            objectTable.position.y = -(r * 190) + 850;
            targets.table.push(objectTable);
          });

          buildStructures();
          setupRenderer();
          transform(targets.table, 2000);
          animate();
        },
        error: function(err) {
          console.error("Gagal membaca Google Sheet CSV:", err);
        }
      });
    }

    function buildStructures() {
      const vector = new THREE.Vector3();

      // 2. ARRANGEMENT: SPHERE
      for (let i = 0, l = objects.length; i < l; i++) {
        const phi = Math.acos(-1 + (2 * i) / l);
        const theta = Math.sqrt(l * Math.PI) * phi;
        const objectSphere = new THREE.Object3D();
        objectSphere.position.setFromSphericalCoords(800, phi, theta);
        vector.copy(objectSphere.position).multiplyScalar(2);
        objectSphere.lookAt(vector);
        targets.sphere.push(objectSphere);
      }

      // 3. ARRANGEMENT: DOUBLE HELIX
      for (let i = 0, l = objects.length; i < l; i++) {
        const strandOffset = (i % 2 === 0) ? 0 : Math.PI;
        const theta = (i * 0.175) + strandOffset;
        const y = -(i * 8) + 450;
        const objectHelix = new THREE.Object3D();
        objectHelix.position.setFromCylindricalCoords(900, theta, y);
        vector.x = objectHelix.position.x * 2;
        vector.y = objectHelix.position.y;
        vector.z = objectHelix.position.z * 2;
        objectHelix.lookAt(vector);
        targets.helix.push(objectHelix);
      }

      // 4. ARRANGEMENT: GRID (5x4x10)
      for (let i = 0, l = objects.length; i < l; i++) {
        const objectGrid = new THREE.Object3D();
        const x = (i % 5);
        const y = Math.floor((i / 5) % 4);
        const z = Math.floor(i / (5 * 4));
        objectGrid.position.x = (x * 300) - 600;
        objectGrid.position.y = -(y * 300) + 450;
        objectGrid.position.z = (z * 400) - 1800;
        targets.grid.push(objectGrid);
      }
    }

    function setupRenderer() {
      renderer = new THREE.CSS3DRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.getElementById('container').appendChild(renderer.domElement);

      controls = new THREE.TrackballControls(camera, renderer.domElement);
      controls.minDistance = 500;
      controls.maxDistance = 6000;
      controls.addEventListener('change', render);

      // EVENT LISTENERS BUTANG
      document.getElementById('table').addEventListener('click', () => transform(targets.table, 2000));
      document.getElementById('sphere').addEventListener('click', () => transform(targets.sphere, 2000));
      document.getElementById('helix').addEventListener('click', () => transform(targets.helix, 2000));
      document.getElementById('grid').addEventListener('click', () => transform(targets.grid, 2000));

      window.addEventListener('resize', onWindowResize);
    }

    function transform(target, duration) {
      TWEEN.removeAll();
      for (let i = 0; i < objects.length; i++) {
        const object = objects[i];
        const targetObject = target[i];

        if (!targetObject) continue;

        new TWEEN.Tween(object.position)
          .to({ x: targetObject.position.x, y: targetObject.position.y, z: targetObject.position.z }, Math.random() * duration + duration)
          .easing(TWEEN.Easing.Exponential.InOut)
          .start();

        new TWEEN.Tween(object.rotation)
          .to({ x: targetObject.rotation.x, y: targetObject.rotation.y, z: targetObject.rotation.z }, Math.random() * duration + duration)
          .easing(TWEEN.Easing.Exponential.InOut)
          .start();
      }

      new TWEEN.Tween(this)
        .to({}, duration * 2)
        .onUpdate(render)
        .start();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      render();
    }

    function animate() {
      requestAnimationFrame(animate);
      TWEEN.update();
      controls.update();
    }

    function render() {
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
